name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest -q

      - name: Generate sample signed release
        run: ./ci/scripts/publish_release.sh 1.9.0 good

      - name: Validate generated release files
        run: |
          test -f ci/artifacts/robot-app-1.9.0.bin
          test -f ci/sbom/sbom-1.9.0.json
          test -f ci/attestations/attestation-1.9.0.json
          test -f ci/manifests/manifest-1.9.0.json
          test -f ci/signatures/robot-app-1.9.0.sig
          test -f ci/signatures/sbom-1.9.0.sig
          test -f ci/signatures/attestation-1.9.0.sig
          test -f ci/signatures/manifest-1.9.0.sig

      - name: Upload generated release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-1.9.0
          path: |
            ci/artifacts/robot-app-1.9.0.bin
            ci/sbom/sbom-1.9.0.json
            ci/attestations/attestation-1.9.0.json
            ci/manifests/manifest-1.9.0.json
            ci/signatures/robot-app-1.9.0.sig
            ci/signatures/sbom-1.9.0.sig
            ci/signatures/attestation-1.9.0.sig
            ci/signatures/manifest-1.9.0.sig
